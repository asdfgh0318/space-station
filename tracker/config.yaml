site:
  name: Warsaw
  latitude: 52.2297
  longitude: 21.0122
  elevation: 100
tracker:
  type: alt-az
  driver: waveshare_hat_b
  park_azimuth: 0.0
  park_elevation: 90.0
  position_tolerance: 0.1
  tracking_interval: 0.5
  azimuth:
    gear_ratio: 1
    steps_per_rev: 200
    microstepping: 32
    min_angle: 0.0
    max_angle: 360.0
    max_speed: 6.0
    acceleration: 3.0
    step_pin: 19
    dir_pin: 13
    enable_pin: 12
    home_switch_pin: 5
    home_switch_enabled: false
    home_offset: 0.0
  elevation:
    gear_ratio: 1
    steps_per_rev: 200
    microstepping: 32
    min_angle: 0.0
    max_angle: 90.0
    max_speed: 6.0
    acceleration: 3.0
    step_pin: 18
    dir_pin: 24
    enable_pin: 4
    home_switch_pin: 6
    home_switch_enabled: false
    home_offset: 0.0
bands:
  l_band:
    enabled: false
    sample_rate: 2400000
    gain: 40.0
    freq_min: 1525000000
    freq_max: 1559000000
    notes: Direct RTL-SDR, no LO/LNB. Inmarsat downlink band.
  ku_band:
    enabled: false
    lnb:
      model: Inverto IDLB-SINL40
      type: PLL
      lo_low: 9750000000
      lo_high: 10600000000
      switch_freq: 11700000000
    gpio:
      power_pin: 23
      voltage_select_pin: 25
      tone_pin: 26
    notes: Dish + LNB. Phase 4 maser detection target.
targets:
  alphasat_25e:
    name: "Inmarsat 4F2 / Alphasat (25\xB0E)"
    sat_longitude: 25.0
    band: l_band
  inmarsat_4f3_98w:
    name: "Inmarsat 4F3 (98\xB0W)"
    sat_longitude: -98.0
    band: l_band
  inmarsat_3f5_54w:
    name: "Inmarsat 3F5 (54\xB0W)"
    sat_longitude: -54.0
    band: l_band
  inmarsat_f1_143_5e:
    name: "Inmarsat F1 (143.5\xB0E)"
    sat_longitude: 143.5
    band: l_band
sniffer:
  enabled: false
  binary_path: vendor/inmarsat-sniffer/build/inmarsat-sniffer
  feed_udp_host: 127.0.0.1
  feed_udp_port: 5000
  skip_c_channel: true
  web_port: 8888
  default_target: alphasat_25e
